<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AapdaSetu | Admin Command Center</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4 fw-bold">🛑 AapdaSetu</h4>
            <a href="index.html" class="active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="resource_allocation.html"><i class="bi bi-people me-2"></i> Resource Alloc.</a>
            <a href="ai_mesh.html"><i class="bi bi-cpu me-2"></i> AI Mesh Network</a>
            <a href="analytics.html"><i class="bi bi-clipboard-check me-2"></i> Analytics</a>
            <hr>
            <a href="../index.html" class="text-danger"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
        </div>

        <div class="col-md-10 p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark">Disaster Response Console</h2>
                    <p class="text-muted mb-0">Region: <strong class="text-primary">Odisha Coastal Zone</strong></p>
                </div>
                <button class="btn btn-warning fw-bold shadow-sm" onclick="simulateScraperInput()">
                    <i class="bi bi-robot"></i> RUN AI SCRAPER
                </button>
            </div>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="card stat-card p-2 mb-3">
                        <div class="card-header bg-white border-0 fw-bold d-flex justify-content-between">
                            <span><i class="bi bi-geo-alt-fill text-primary"></i> Live Incident Map</span>
                            <span class="badge bg-danger" id="active-alerts-count-badge">0 Active Alerts</span>
                        </div>
                        <div id="googleMap" class="map-container"></div>
                    </div>

                    <div class="card stat-card">
                        <div class="card-header bg-success text-white fw-bold">
                            <i class="bi bi-broadcast"></i> LIVE BROADCASTS (Public)
                        </div>
                        <div class="card-body" id="active-broadcasts-container">
                            <p class="text-muted small">No active disasters.</p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card stat-card h-100">
                        <div class="card-header bg-light p-0">
                            <ul class="nav nav-tabs nav-fill" id="adminTabs" role="tablist">
                                <li class="nav-item">
                                    <button class="nav-link active py-3" id="ai-tab" data-bs-toggle="tab" data-bs-target="#ai-panel" type="button">
                                        <i class="bi bi-stars text-warning"></i> AI Alerts
                                    </button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link py-3" id="reports-tab" data-bs-toggle="tab" data-bs-target="#reports-panel" type="button">
                                        <i class="bi bi-person-exclamation text-danger"></i> Citizen SOS
                                    </button>
                                </li>
                            </ul>
                        </div>

                        <div class="card-body panel-scroll tab-content">
                            
                            <div class="tab-pane fade show active" id="ai-panel">
                                <div id="incoming-alerts">
                                    <div class="text-center text-muted mt-5" id="ai-empty-state">
                                        <i class="bi bi-shield-check display-1 opacity-25"></i>
                                        <p class="mt-3">AI Scraper is monitoring sources...</p>
                                    </div>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="reports-panel">
                                <div class="d-flex justify-content-between mb-3 align-items-center">
                                    <small class="text-muted fw-bold">PRIORITY SORTED</small>
                                    <button class="btn btn-sm btn-outline-secondary" onclick="fetchCitizenReports()">
                                        <i class="bi bi-arrow-clockwise"></i> Refresh
                                    </button>
                                </div>
                                <div id="citizen-reports-feed">
                                    <div class="text-center text-muted mt-5">
                                        <p>Loading reports...</p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div> 
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-script.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBNX00snr3BdhknJFTBX9l3ekhrhJzg8PA&callback=initMap&libraries=marker&loading=async" async defer></script>

</body>
</html>
